<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/ovomod/">
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <title>OvO</title>

  <link rel="manifest" href="appmanifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
  <meta name="HandheldFriendly" content="true" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

  <style>
    * { padding: 0; margin: 0; }
    html, body {
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      -ms-touch-action: none;
    }
    canvas {
      touch-action-delay: none;
      touch-action: none;
      -ms-touch-action: none;
    }
  </style>

  <link href="animate.css" rel="stylesheet" type="text/css" />
  <link href="hmmg_layoutTransition.css" rel="stylesheet" type="text/css" />
  <link href="jquery.gritter.css" rel="stylesheet" type="text/css" />
</head>

<body>

<div id="c2canvasdiv">
  <canvas id="c2canvas" width="640" height="640"></canvas>
</div>

<script src="jquery-3.4.1.min.js"></script>

<script>
(function() {
    var OriginalImage = window.Image;
    window.Image = function() {
        var img = new OriginalImage();
        img.crossOrigin = "anonymous";
        return img;
    };
    var originalCreateElement = document.createElement.bind(document);
    document.createElement = function(tagName) {
        var element = originalCreateElement(tagName);
        if (tagName.toLowerCase() === 'img') {
            element.crossOrigin = "anonymous";
        }
        return element;
    };
})();
</script>

<script src="GameAnalytics.js"></script>
<script src="Tween.js"></script>
<script src="html2canvas.min.js"></script>
<script src="jquery.gritter.js"></script>
<script src="howler.js"></script>
<script src="c7runtime.js"></script>

<script>
jQuery(document).ready(function () {
  cr_createRuntime("c2canvas");
});

function onVisibilityChanged() {
  if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
    cr_setSuspended(true);
  else
    cr_setSuspended(false);
};

document.addEventListener("visibilitychange", onVisibilityChanged, false);
document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

window.C2_RegisterSW = function C2_RegisterSW() {
  if (!navigator.serviceWorker) return;
  try {
    navigator.serviceWorker.register("sw.js", { scope: "./" })
  } catch (e) {}
};
</script>

<script>
var VERSION = VERSION || (function(){
  return {
    version : function() { return "CTLE" },
    skinVersion : function() { return "1.4.5" },
    replayVersion : function() { return "1.4.4" },
  };
}());
</script>

<script src="https://cdn.jsdelivr.net/gh/Arjun99ab/ovo@main/src/modloaders/modloader.js" id="modloader" type="module" defer></script>

</body>
</html>
